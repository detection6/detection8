<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>新增客户报告</title>
  <style>
    :root {
      color-scheme: light;
      --navy: #08274f;
      --blue: #0879c9;
      --blue-deep: #056bb7;
      --line: #dbe4ed;
      --muted: #5d6675;
      --paper: #ffffff;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    html { background: #f7f9fc; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #111827;
      background: #f7f9fc;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
      -webkit-text-size-adjust: 100%;
    }
    .page {
      width: min(100%, 720px);
      min-height: 100vh;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 28px rgba(13, 49, 87, .05);
    }
    header {
      padding: 28px 22px 24px;
      color: #fff;
      background: linear-gradient(120deg, var(--blue), var(--blue-deep));
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 800;
    }
    header p {
      margin: 8px 0 0;
      font-size: 15px;
      line-height: 1.6;
      opacity: .92;
    }
    main {
      padding: 22px 18px 38px;
    }
    form {
      display: grid;
      gap: 16px;
    }
    label {
      display: grid;
      gap: 8px;
      color: var(--navy);
      font-size: 16px;
      font-weight: 800;
    }
    input {
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid #cfd9e5;
      border-radius: 8px;
      color: #111827;
      background: var(--paper);
      font: inherit;
      font-size: 16px;
      font-weight: 400;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(8, 121, 201, .16);
    }
    .hint {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      font-weight: 400;
    }
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }
    button, .fallback {
      min-height: 50px;
      border-radius: 8px;
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      text-align: center;
      cursor: pointer;
    }
    button {
      border: 0;
      color: #fff;
      background: var(--blue);
    }
    .fallback {
      display: grid;
      place-items: center;
      border: 1px solid #cfd9e5;
      color: var(--navy);
      background: #fff;
      text-decoration: none;
    }
    .error {
      min-height: 22px;
      margin: 0;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.6;
    }
    .notice {
      margin: 18px 0 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fbfdff;
      font-size: 13px;
      line-height: 1.7;
    }
    @media (max-width: 380px) {
      header { padding: 24px 16px 21px; }
      h1 { font-size: 25px; }
      main { padding: 18px 14px 32px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>新增客户报告</h1>
      <p>填写后跳转到 GitHub 私有后台确认提交</p>
    </header>

    <main>
      <form id="report-form">
        <label>
          报告编号
          <input id="report-number" name="report-number" autocomplete="off" placeholder="例如 ZGC202602316" required>
        </label>

        <label>
          送检单位
          <input id="company" name="company" autocomplete="off" placeholder="填写送检单位完整名称" required>
        </label>

        <label>
          样品名称
          <input id="sample-name" name="sample-name" autocomplete="off" placeholder="填写样品名称" required>
        </label>

        <label>
          型号或规格
          <input id="model-spec" name="model-spec" autocomplete="off" value="/" required>
        </label>

        <label>
          报告日期
          <input id="report-date" name="report-date" type="date" required>
          <span class="hint">默认今天，点击日期可打开手机日历选择。</span>
        </label>

        <div class="actions">
          <button type="submit">打开 GitHub 提交</button>
          <a class="fallback" href="https://github.com/detection6/detection8-admin/issues/new/choose">使用原 GitHub 表单</a>
        </div>

        <p id="error" class="error" aria-live="polite"></p>
      </form>

      <p class="notice">跳转后请检查 GitHub 页面内容，再点击提交。自动流程完成后，会在该事项下回复客户查询链接和二维码。</p>
    </main>
  </div>

  <script>
    (() => {
      "use strict";

      const privateIssueUrl = "https://github.com/detection6/detection8-admin/issues/new";
      const byId = (id) => document.getElementById(id);

      const todayInShanghai = () => {
        const parts = new Intl.DateTimeFormat("zh-CN", {
          timeZone: "Asia/Shanghai",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).formatToParts(new Date());
        const part = (type) => parts.find((item) => item.type === type)?.value || "";
        return `${part("year")}-${part("month")}-${part("day")}`;
      };

      const clean = (value, maxLength) => String(value || "").trim().replace(/\r?\n+/g, " ").slice(0, maxLength);

      const buildIssueBody = (report) => [
        "### 报告编号",
        "",
        report.reportNumber,
        "",
        "### 送检单位",
        "",
        report.company,
        "",
        "### 样品名称",
        "",
        report.sampleName,
        "",
        "### 型号或规格",
        "",
        report.modelSpec,
        "",
        "### 报告日期",
        "",
        report.reportDate,
        "",
        "### 发布确认",
        "",
        "- [x] 我已核对以上报告资料，同意生成客户二维码",
      ].join("\n");

      byId("report-date").value = todayInShanghai();

      byId("report-form").addEventListener("submit", (event) => {
        event.preventDefault();
        byId("error").textContent = "";

        const report = {
          reportNumber: clean(byId("report-number").value, 120),
          company: clean(byId("company").value, 200),
          sampleName: clean(byId("sample-name").value, 120),
          modelSpec: clean(byId("model-spec").value, 120) || "/",
          reportDate: byId("report-date").value,
        };

        if (!report.reportNumber || !report.company || !report.sampleName || !report.reportDate) {
          byId("error").textContent = "请先填写完整的报告资料。";
          return;
        }

        const params = new URLSearchParams({
          title: `[新增报告] ${report.reportNumber}`,
          body: buildIssueBody(report),
        });
        location.href = `${privateIssueUrl}?${params.toString()}`;
      });
    })();
  </script>
</body>
</html>
